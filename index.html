<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 

 @layer base {
      button {
        @apply rounded-md bg-slate-200 border-1 border-slate-400  px-4 py-1 my-5 mx-5 text-sm cursor-pointer disabled:opacity-50
      }

    }
    
  </style> 
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100">
        <h1 class="text-2xl font-bold text-slate-800 text-center mb-2">¿Es una palabra bonita?</h1>
        <p class="text-xs text-slate-500 text-center mb-6">Según los estudios lingüísticos modernos</p>
        
        <form id="formPalabra" onsubmit="analizarPalabra(event)" class="space-y-4">
            <div>
                <label for="palabra" class="block text-sm font-semibold text-slate-600 mb-1">Introduce una palabra</label>
                <input type="text" id="palabra" required autocomplete="off"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <button type="submit" 
                    class="w-full bg-blue-400 text-white font-medium py-2 rounded-lg hover:bg-purple-700 transition duration-200 cursor-pointer">
                Analizar Palabra
            </button>
        </form>

        <p id="parrafoResultado" class="mt-6 p-4 rounded-lg text-center font-medium hidden"></p>
    </div>
    
    <script src="./js/app.js"></script>
</body>
</html>
